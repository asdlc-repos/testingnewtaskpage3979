apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: leave-service

endpoints:
  - name: http
    type: HTTP
    port: 9090
    basePath: /
    visibility:
      - external

dependencies:
  endpoints:
    - component: user-service
      name: http
      visibility: project
      envBindings:
        address: USER_SERVICE_URL
